services:
  bot:
    build: .
    container_name: telegram_bot
    restart: unless-stopped
    # BOT_TOKEN и ALL_PROXY бот читает сам из .env через load_dotenv().
    # Файл .env попадает в контейнер через volume-монтирование ниже.
    # ALL_PROXY — прокси ТОЛЬКО для запросов в ЛК/sut.ru (Telegram ходит напрямую).
    volumes:
      - .:/app  # Монтируем текущую директорию для разработки (включая .env)
    # «Бот жив»: heartbeat_loop в main.py обновляет /tmp/satanbot_heartbeat,
    # healthcheck.py проверяет его свежесть. interval×retries даёт ~3 мин до unhealthy.
    healthcheck:
      test: ["CMD", "python", "-u", "healthcheck.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"  # Ограничиваем размер логов
        max-file: "3"    # Храним только 3 файла логов
    deploy:
      resources:
        limits:
          cpus: '0.8'  # Ограничиваем использование CPU
          memory: 512M  # Ограничиваем использование памяти